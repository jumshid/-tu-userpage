<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamshid Rokhsat — Wirtschaftsingenieurwesen, TU Berlin</title>
<style>
  :root {
    --bg: #f7f5f0;
    --fg: #1c2430;
    --fg-soft: #4a5568;
    --accent: #2a7f7e;
    --line: #d8d3c7;
    --card-bg: #ffffff;
    --mono: "IBM Plex Mono", "Courier New", monospace;
    --sans: "IBM Plex Sans", "Segoe UI", sans-serif;
    --transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease;
  }

  [data-theme="dark"] {
    --bg: #10151c;
    --fg: #e7e9ec;
    --fg-soft: #a2acb8;
    --accent: #e4a24a;
    --line: #2a3340;
    --card-bg: #171e27;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    transition: var(--transition);
    line-height: 1.55;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 4.5rem 1.5rem 4rem;
  }

  .prompt {
    font-family: var(--mono);
    font-size: 0.9rem;
    color: var(--accent);
    letter-spacing: 0.02em;
    margin-bottom: 0.4rem;
    transition: var(--transition);
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(1.7rem, 4vw, 2.3rem);
    margin: 0 0 0.3rem 0;
    letter-spacing: -0.01em;
  }

  .role {
    color: var(--fg-soft);
    margin: 0 0 2.2rem 0;
    font-size: 1.02rem;
    transition: var(--transition);
  }

  p { color: var(--fg); }

  section {
    margin-bottom: 2.2rem;
  }

  .label {
    font-family: var(--mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 0.6rem;
    transition: var(--transition);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 0.3rem 0.65rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--fg-soft);
    transition: var(--transition);
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 1.1rem 1.3rem;
    transition: var(--transition);
  }

  .card p { margin: 0; color: var(--fg-soft); font-size: 0.95rem; }

  footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: var(--transition);
  }

  footer small {
    color: var(--fg-soft);
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  /* Theme toggle, gestylt wie ein Terminal-Kommando */
  #theme-toggle {
    font-family: var(--mono);
    font-size: 0.78rem;
    background: transparent;
    color: var(--fg-soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0.45rem 0.75rem;
    cursor: pointer;
    transition: var(--transition);
  }

  #theme-toggle:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  #theme-toggle:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .cursor {
    display: inline-block;
    width: 0.55ch;
    background: var(--accent);
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .cursor { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">

    <p class="prompt">~/jamshid &gt; whoami</p>
    <h1>Jamshid Rokhsat<span class="cursor">&nbsp;</span></h1>
    <p class="role">Wirtschaftsingenieurwesen, TU Berlin — Vertiefung IT und Kommunikation</p>

    <section>
      <div class="card">
        <p>Diese Seite wird laufend aktualisiert.</p>
      </div>
    </section>

    <footer>
      <small>TU Berlin · User Page</small>
      <button id="theme-toggle" type="button" aria-pressed="false">
        $ theme --dark
      </button>
    </footer>

  </div>

  <script>
    (function () {
      var toggleButton = document.getElementById('theme-toggle');
      var root = document.documentElement;
      var STORAGE_KEY = 'preferred-theme';

      function applyTheme(theme) {
        if (theme === 'dark') {
          root.setAttribute('data-theme', 'dark');
          toggleButton.textContent = '$ theme --light';
          toggleButton.setAttribute('aria-pressed', 'true');
        } else {
          root.removeAttribute('data-theme');
          toggleButton.textContent = '$ theme --dark';
          toggleButton.setAttribute('aria-pressed', 'false');
        }
      }

      var saved = null;
      try {
        saved = localStorage.getItem(STORAGE_KEY);
      } catch (e) {
        // localStorage evtl. nicht verfügbar - dann einfach mit Hell starten
      }

      if (saved === 'dark' || saved === 'light') {
        applyTheme(saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        applyTheme('dark');
      }

      toggleButton.addEventListener('click', function () {
        var isDark = root.getAttribute('data-theme') === 'dark';
        var next = isDark ? 'light' : 'dark';
        applyTheme(next);
        try {
          localStorage.setItem(STORAGE_KEY, next);
        } catch (e) {
          // Speichern fehlgeschlagen - Einstellung gilt nur fuer diese Sitzung
        }
      });
    })();
  </script>

</body>
</html>
